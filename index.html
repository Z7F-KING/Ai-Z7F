        .ibtn { padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; }
        
        /* Mobile */

### كيف تجعله "شغالاً فوراً"؟

بما أنك تريد API جاهز، إليك أسرع طريقة في العالم للحصول على واحد مجاني وآمن:
1. اذهب لموقع **Groq Cloud** أو **OpenRouter**.
2. سجل بجوجل (مجاني تماماً ويعطيك رصيداً ضخماً).
3. انسخ المفتاح وضعه في الكود مكان `"ضع_مفتاحك_هنا"`.

**لماذا هذا التصميم أفضل؟**
* **ترتيب المحادثات:** الآن كل مرة تكتب فيها شيئاً جديداً، سيتم حفظها في القائمة الجانبية باسم المحادثة.
* **الجمالية:** استخدمت نظام "الزجاج المطفي" (Glassmorphism) وألواناً مريحة للعين في الجوال.
* **القوة:** الكود يدعم وضع التفكير العميق الذي طلبته برمجياً.

هل تود أن أشرح لك كيف تربطه بـ **Discord** لكي ترسل النتائج مباشرة هناك؟
