<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#0d1117" />
    <meta
      name="description"
      content="Dola-X: نظام الذكاء الاصطناعي الخارق لتوليد الأكواد وبوتات الديسكورد بدون قيود."
    />
    
    <!-- استدعاء خطوط Google للجوانب التقنية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Noto+Sans+Arabic:wght@400;700;900&display=swap" rel="stylesheet">

    <title>DOLA-X | مبرمج الذكاء الاصطناعي الخارق</title>
    
    <style>
      /* لضمان عدم وجود بياض أثناء تحميل الصفحة */
      body {
        background-color: #0d1117;
        margin: 0;
        padding: 0;
        font-family: 'Noto Sans Arabic', sans-serif;
      }
      
      /* شاشة تحميل بسيطة قبل اشتغال الـ React */
      #loader {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: #22d3ee;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #161b22;
        border-top: 4px solid #22d3ee;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>تحتاج لتفعيل JavaScript لتشغيل محرك Dola-X.</noscript>
    
    <div id="root">
      <!-- شاشة تحميل مؤقتة -->
      <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold; letter-spacing: 2px;">DOLA-X INITIALIZING...</p>
      </div>
    </div>

  </body>
</html>
