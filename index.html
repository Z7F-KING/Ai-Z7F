<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola Elite - Ultra Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/base16/dracula.min.css">
    <style>
        :root { --primary: #8b5cf6; --bg: #050505; --card: #0d0d0e; --accent: #22d3ee; }
        body { background-color: var(--bg); color: #e4e4e7; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        /* القائمة الجانبية */
        .sidebar { width: 280px; background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; z-index: 50; }
        @media (max-width: 768px) { .sidebar { display: none; } }

        /* منطقة الدردشة */
        .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        #chatBox::-webkit-scrollbar { display: none; }
        
        .msg-container { max-width: 850px; margin: 0 auto 1.5rem auto; width: 100%; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-user { background: #161618; padding: 12px 18px; border-radius: 18px; border: 1px solid #222; margin-left: auto; width: fit-content; max-width: 85%; }
        .msg-ai { line-height: 1.7; font-size: 15px; color: #d1d1d6; }

        /* صندوق الكود الفخم والمعدل بضبط */
        .code-block { margin: 20px 0; border-radius: 12px; background: #000; border: 1px solid #222; overflow: hidden; direction: ltr !important; }
        .code-header { background: #121212; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .code-lang { font-size: 11px; font-family: monospace; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .code-tools { display: flex; gap: 18px; align-items: center; }
        .code-tools i { font-size: 15px; color: #555; cursor: pointer; transition: 0.2s; }
        .code-tools i:hover { color: white; transform: scale(1.1); }
        
        pre { margin: 0; padding: 15px; overflow-x: auto; background: #000 !important; }
        code { font-family: 'Consolas', 'Monaco', monospace !important; font-size: 13px !important; line-height: 1.5; }

        /* منطقة الإدخال */
        .input-area { padding: 20px; background: linear-gradient(to top, var(--bg) 80%, transparent); }
        .input-box { background: #111112; border: 1px solid #222; border-radius: 20px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 12px; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { background: transparent; border: none; outline: none; color: white; resize: none; width: 100%; padding: 6px; font-size: 15px; max-height: 150px; }

        .icon-btn { color: #444; cursor: pointer; transition: 0.2s; font-size: 1.2rem; margin-bottom: 5px; }
        .icon-btn:hover { color: var(--primary); }
        .brain-active { color: var(--accent) !important; text-shadow: 0 0 10px var(--accent); }
        .send-btn { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: 0.2s; }
        .send-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="p-6">
                <div class="text-2xl font-black text-white mb-10 flex items-center gap-2 tracking-tighter">
                    <div class="w-2.5 h-8 bg-purple-500 rounded-full"></div> DOLA AI
                </div>
                <button onclick="newChat()" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/5 rounded-xl text-sm transition text-gray-300 font-bold mb-8">
                    + محادثة جديدة
                </button>
                <div class="space-y-4">
                    <div class="text-[10px] text-gray-600 font-bold tracking-widest uppercase">الأدوات المفعلة</div>
                    <div class="text-xs text-gray-400 bg-white/5 p-3 rounded-lg border border-white/5">
                        <i class="fas fa-user-shield ml-2 text-purple-500"></i> خبير أمني (Active)
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="chat-main">
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-zinc-950/20 backdrop-blur-sm">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-xs font-bold text-gray-500">DOLA_ULTRA_CORE_V6</span>
                </div>
                <select id="modelSelect" class="bg-transparent text-[11px] text-gray-500 font-bold outline-none uppercase tracking-widest">
                    <option value="llama-3.3-70b-versatile">Expert Brain (70B)</option>
                    <option value="mixtral-8x7b-32768">Speed Engine</option>
                </select>
            </header>

            <div id="chatBox">
                <div class="msg-container msg-ai">
                    أهلاً بك.. أنا Dola. المحرك الآن يعمل بدقة 100%. 
                    تم تحسين صناديق الأكواد وتنسيقها، وأصبحت الآن خبيراً في النقاش والبرمجة معاً. كيف يمكنني خدمتك؟
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <i class="fas fa-paperclip icon-btn"></i>
                    <textarea id="userInput" rows="1" placeholder="اسأل Dola أو اطلب كوداً..."></textarea>
                    <div class="flex items-center gap-4">
                        <i id="thinkBtn" onclick="toggleThinking()" class="fas fa-brain icon-btn" title="وضع التفكير العميق"></i>
                        <button onclick="sendMessage()" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "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";
        let isThinking = false;
        let chatHistory = [];

        function toggleThinking() { isThinking = !isThinking; document.getElementById('thinkBtn').classList.toggle('brain-active'); }
        function newChat() { document.getElementById('chatBox').innerHTML = ''; chatHistory = []; appendMessage('ai', 'بدأنا جلسة جديدة. أنا بكامل جاهزيتي.'); }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            chatHistory.push({ role: "user", content: isThinking ? "[DEEP_EXPERT_MODE] " + message : message });
            const loadingId = 'ai-' + Date.now();
            appendMessage('ai', `<div class="flex gap-1.5"><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.2s"></div><div class="w-1.5 h-1.5 bg-purple-500 rounded-full animate-bounce" style="animation-delay:0.4s"></div></div>`, loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: document.getElementById('modelSelect').value,
                        messages: [
                            { role: "system", content: "You are DOLA ELITE. You are a tech god. Talk naturally like a human expert. Only provide code if needed or requested. Your code must be 100% complete and perfect. Respond in Arabic." },
                            ...chatHistory
                        ],
                        temperature: 0.3
                    })
                });
                const data = await response.json();
                const content = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: content });
                document.getElementById(loadingId).innerHTML = formatAIResponse(content);
                hljs.highlightAll();
            } catch (e) { document.getElementById(loadingId).innerText = "ERROR_CONNECTION"; }
        }

        function formatAIResponse(text) {
            const codeRegex = /```(\w+)?\n([\s\S]*?)```/g;
            return text.replace(codeRegex, (match, lang, code) => {
                const id = 'code-' + Math.random().toString(36).substr(2, 9);
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span class="code-lang">${lang || 'code'}</span>
                            <div class="code-tools">
                                <i class="fas fa-copy" onclick="copyCode('${id}')" title="نسخ"></i>
                                <i class="fas fa-download" onclick="downloadCode('${id}', '${lang || 'txt'}')" title="تحميل"></i>
                            </div>
                        </div>
                        <pre><code id="${id}" class="language-${lang}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg-container`;
            div.innerHTML = `<div class="${role === 'user' ? 'msg-user' : 'msg-ai'}" id="${id}">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert('تم نسخ الكود!'); }
        function downloadCode(id, lang) {
            const blob = new Blob([document.getElementById(id).innerText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `dola_code.${lang}`;
            a.click();
        }

        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
