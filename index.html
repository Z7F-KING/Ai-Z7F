<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola AI Studio | DeepSeek Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --side: #161b22; --accent: #58a6ff; --text: #c9d1d9;
            --deep-purple: #8957e5; --user-bg: #1f2937;
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Navbar */
        nav { background: var(--side); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .logo { font-weight: bold; font-size: 1.5rem; color: var(--accent); }
        select { background: #21262d; color: white; border: 1px solid #30363d; padding: 5px 10px; border-radius: 6px; }

        /* Chat Area */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 12px; line-height: 1.6; max-width: 85%; position: relative; }
        .user { align-self: flex-end; background: var(--user-bg); border: 1px solid #30363d; }
        .ai { align-self: flex-start; background: #161b22; border: 1px solid var(--accent); }
        
        .thinking { color: var(--deep-purple); font-size: 0.85rem; margin-bottom: 10px; display: none; font-style: italic; }
        .status { font-size: 0.7rem; color: #8b949e; text-align: center; padding: 5px; }

        /* Input Box */
        .input-wrapper { padding: 20px 15%; background: var(--bg); }
        .input-area { background: #21262d; border: 1px solid #30363d; border-radius: 12px; display: flex; padding: 10px; gap: 10px; align-items: center; }
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; resize: none; font-family: inherit; font-size: 1rem; }
        
        .btn-deep { background: transparent; border: 1px solid var(--deep-purple); color: var(--deep-purple); padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
        .btn-deep.active { background: var(--deep-purple); color: white; }
        .btn-send { background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Dola AI</div>
    <select id="model-select">
        <option value="DeepSeek-V3-GGUF">DeepSeek V3 (WebGPU)</option>
        <option value="Llama-3-8B">Llama 3</option>
    </select>
</nav>

<div id="status" class="status">جاهز للعمل..</div>

<div id="chat-box">
    <div class="msg ai">أهلاً بك! أنا ذكاؤك الاصطناعي الخاص على GitHub. اسألني أي شيء.</div>
</div>

<div class="input-wrapper">
    <div class="input-area">
        <button class="btn-deep" id="deep-btn" onclick="toggleDeep()">التفكير العميق: OFF</button>
        <textarea id="user-input" rows="1" placeholder="اكتب سؤالك هنا..."></textarea>
        <button class="btn-send" id="send-btn">إرسال</button>
    </div>
</div>

<script type="module">
    // استخدام مكتبة WebLLM لتشغيل الموديل داخل المتصفح مباشرة
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let isDeep = false;
    const chatBox = document.getElementById('chat-box');
    const status = document.getElementById('status');

    // وظيفة التفكير العميق
    window.toggleDeep = () => {
        isDeep = !isDeep;
        document.getElementById('deep-btn').classList.toggle('active');
        document.getElementById('deep-btn').innerText = isDeep ? "التفكير العميق: ON" : "التفكير العميق: OFF";
    };

    async function initAI() {
        status.innerText = "جاري تحميل محرك الذكاء الاصطناعي (قد يستغرق وقتاً في المرة الأولى)...";
        engine = await webllm.CreateMLCEngine(document.getElementById('model-select').value, {
            initProgressCallback: (p) => status.innerText = `جاري التحميل: ${Math.round(p.progress * 100)}%`
        });
        status.innerText = "متصل وجاهز!";
    }

    document.getElementById('send-btn').onclick = async () => {
        const input = document.getElementById('user-input');
        const prompt = input.value.trim();
        if(!prompt) return;

        if(!engine) await initAI();

        // إضافة رسالة المستخدم
        const userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.innerText = prompt;
        chatBox.appendChild(userMsg);
        input.value = '';

        // إضافة رسالة الـ AI
        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerHTML = `<div class="thinking" id="think-box">جاري تحليل الطلب بعمق...</div><div class="text"></div>`;
        chatBox.appendChild(aiMsg);
        
        if(isDeep) aiMsg.querySelector('#think-box').style.display = 'block';

        const chunks = await engine.chat.completions.create({
            messages: [{ role: "user", content: prompt }],
            stream: true
        });

        let reply = "";
        for await (const chunk of chunks) {
            const content = chunk.choices[0]?.delta?.content || "";
            reply += content;
            aiMsg.querySelector('.text').innerText = reply;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };
</script>

</body>
</html>
