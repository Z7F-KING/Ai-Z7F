<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola AI - Smart Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة التنسيق -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <style>
        :root { --primary: #6366f1; --bg: #09090b; --sidebar: #111113; }
        body { background-color: var(--bg); color: #e4e4e7; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; margin: 0; }
        
        .sidebar { background-color: var(--sidebar); border-left: 1px solid #1f1f23; width: 260px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; background: radial-gradient(circle at top, #111 0%, #09090b 100%); }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 2rem 1rem; scrollbar-width: none; }
        #chatBox::-webkit-scrollbar { display: none; }

        .msg-container { max-width: 800px; margin: 0 auto 1.5rem auto; width: 100%; }
        .msg-user { background: #1e1e21; padding: 12px 20px; border-radius: 18px; align-self: flex-end; border: 1px solid #2e2e32; width: fit-content; max-width: 80%; margin-left: auto; }
        .msg-ai { line-height: 1.8; color: #d4d4d8; font-size: 15px; }

        /* صندوق الكود المحسن لعدم جعل الشاشة عريضة */
        .code-block { 
            margin: 20px 0; 
            border-radius: 10px; 
            background: #000; 
            border: 1px solid #27272a;
            max-width: 100%; /* يمنع العرض الزائد */
            overflow: hidden;
        }
        .code-header { 
            background: #18181b; 
            padding: 8px 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 12px; 
            border-bottom: 1px solid #27272a;
        }
        pre { 
            margin: 0; 
            padding: 15px; 
            overflow-x: auto; /* يجعل الكود داخلي السحب ولا يوسع الموقع */
            white-space: pre-wrap; /* كسر الأسطر الطويلة */
            word-break: break-all;
        }
        code { font-family: 'Fira Code', monospace !important; font-size: 13px !important; }

        .input-area { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 8px 12px; display: flex; align-items: flex-end; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { background: transparent; border: none; outline: none; color: white; resize: none; width: 100%; padding: 8px; max-height: 200px; }

        .btn-action { color: #71717a; transition: 0.2s; cursor: pointer; }
        .btn-action:hover { color: white; }
        .brain-active { color: #22d3ee !important; text-shadow: 0 0 10px #22d3ee; }
        
        .btn-send { background: var(--primary); color: white; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <!-- القائمة الجانبية -->
    <aside class="sidebar hidden md:flex flex-col p-5">
        <div class="font-bold text-xl mb-10 flex items-center gap-2">
            <div class="w-2 h-6 bg-indigo-500 rounded-full"></div> DOLA
        </div>
        <div class="space-y-4 text-sm text-zinc-500">
            <div class="p-2 hover:bg-zinc-900 rounded-md cursor-pointer transition flex items-center gap-2">
                <i class="fas fa-plus"></i> محادثة جديدة
            </div>
        </div>
    </aside>

    <!-- منطقة الشات الرئيسية -->
    <main class="chat-area">
        <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-6">
            <select id="modelSelect" class="bg-transparent text-xs text-zinc-400 outline-none">
                <option value="llama-3.3-70b-versatile">Dola Intelligence</option>
                <option value="mixtral-8x7b-32768">Fast Coding</option>
            </select>
            <div class="text-xs text-zinc-500">مفتاح API مفعل</div>
        </header>

        <div id="chatBox">
            <div class="msg-container msg-ai">
                مرحباً بك، اسمي Dola. كيف يمكنني مساعدتك برمجياً اليوم؟
                <br>سأسألك دائماً عن التفاصيل قبل البدء لضمان حصولك على كود مثالي.
            </div>
        </div>

        <div class="p-6">
            <div class="max-w-3xl mx-auto">
                <div class="input-area">
                    <textarea id="userInput" rows="1" placeholder="اطلب كوداً أو اطرح سؤالاً..."></textarea>
                    <div class="flex items-center gap-4 mb-1">
                        <i id="thinkBtn" onclick="toggleThinking()" class="fas fa-brain btn-action text-lg" title="التفكير العميق"></i>
                        <button onclick="sendMessage()" class="btn-send">
                            <i class="fas fa-paper-plane text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "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";
        let isThinking = false;

        function toggleThinking() {
            isThinking = !isThinking;
            document.getElementById('thinkBtn').classList.toggle('brain-active');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            const loadingId = 'ai-' + Date.now();
            appendMessage('ai', `<i class="fas fa-circle-notch fa-spin"></i>`, loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: document.getElementById('modelSelect').value,
                        messages: [
                            { 
                                role: "system", 
                                content: `You are DOLA. 
                                Rule 1: Always respond in ARABIC. 
                                Rule 2: If the user asks for code (e.g., "design a script"), DO NOT write the code immediately. Instead, ask the user clarifying questions about the requirements, language, and features.
                                Rule 3: ONLY provide code when you have enough information.
                                Rule 4: When providing code, use triple backticks and provide the COMPLETE code without omissions.
                                Rule 5: Be friendly and professional like a real human expert.` 
                            },
                            { role: "user", content: isThinking ? "[DEEP ANALYSIS] " + message : message }
                        ],
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                document.getElementById(loadingId).innerHTML = formatAIResponse(content);
                hljs.highlightAll();
            } catch (error) {
                document.getElementById(loadingId).innerText = "حدث خطأ في الاتصال بالذكاء الاصطناعي.";
            }
        }

        function formatAIResponse(text) {
            const codeRegex = /```(\w+)?\n([\s\S]*?)```/g;
            return text.replace(codeRegex, (match, lang, code) => {
                const id = 'code-' + Math.random().toString(36).substr(2, 9);
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span>${lang || 'code'}</span>
                            <div class="flex gap-3">
                                <i class="fas fa-copy btn-action" onclick="copyCode('${id}')"></i>
                                <i class="fas fa-expand-alt btn-action"></i>
                            </div>
                        </div>
                        <pre><code id="${id}" class="language-${lang}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg-container fade-in`;
            div.innerHTML = `<div class="${role === 'user' ? 'msg-user' : 'msg-ai'}" id="${id}">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(id) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code);
            alert('تم نسخ الكود!');
        }

        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 180) + 'px';
        });
    </script>
</body>
</html>
