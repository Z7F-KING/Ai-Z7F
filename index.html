<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola AI Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --accent: #3b82f6; --text: #efefef; --user-msg: #2b303b; --ai-msg: #1e2229; --think: #8b5cf6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 12px 15px; background: #17191e; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3139; }
        .logo { font-weight: bold; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid #2d3139; border-bottom-left-radius: 4px; }
        .thinking-tag { color: var(--think); font-size: 0.75rem; margin-bottom: 5px; font-weight: bold; display: none; }
        .input-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); padding: 15px; }
        .input-box { background: #22252d; border: 1px solid #3f444e; border-radius: 25px; display: flex; align-items: center; padding: 8px 15px; gap: 8px; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 1rem; }
        .btn-send { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .loading { color: #666; font-size: 0.8rem; text-align: center; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">Dola Mobile AI</div>
    <div style="font-size: 0.8rem; color: #888;">نموذج: Llama-3</div>
</header>

<div id="chat-window">
    <div class="msg ai">أهلاً! أنا ذكاؤك الاصطناعي. اسألني أي شيء وسأجيبك الآن.</div>
</div>

<div class="input-fixed">
    <div id="loader" class="loading">جاري التفكير...</div>
    <div class="input-box">
        <textarea id="userInput" placeholder="اكتب سؤالك..." rows="1"></textarea>
        <button class="btn-send" onclick="handleSend()">↑</button>
    </div>
</div>

<script>
    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const loader = document.getElementById('loader');
        if (!text) return;

        // إضافة رسالة المستخدم
        addMessage(text, 'user');
        input.value = '';
        loader.style.display = 'block';

        try {
            // هذا الرابط يتصل بذكاء اصطناعي حقيقي (Llama 3) مجاناً للطلبات البسيطة
            const response = await fetch("https://api-inference.huggingface.co/models/Meta-Llama-3-8B-Instruct", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();
            loader.style.display = 'none';

            if (data && data[0] && data[0].generated_text) {
                // تنظيف النص المستلم وعرضه
                let aiText = data[0].generated_text.replace(text, "").trim();
                addMessage(aiText || "لم أستطع فهم ذلك، حاول مرة أخرى.", 'ai');
            } else {
                addMessage("عذراً، السيرفر مشغول حالياً. جرب بعد لحظات.", 'ai');
            }
        } catch (error) {
            loader.style.display = 'none';
            addMessage("خطأ في الاتصال بالإنترنت.", 'ai');
        }
    }

    function addMessage(text, type) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
