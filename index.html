<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Chat V2</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --bg:#0b0c12;
  --panel:rgba(20,20,30,0.65);
  --border:rgba(255,255,255,0.06);
  --text:#fff;
  --accent:#6c63ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:radial-gradient(circle at top,#15152a,#0b0c12);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:270px;
  background:var(--panel);
  backdrop-filter:blur(18px);
  border-right:1px solid var(--border);
  padding:20px;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  transition:.35s ease;
  z-index:10;
}

.sidebar.hide{
  transform:translateX(-100%);
}

.logo{
  font-size:18px;
  margin-bottom:20px;
  opacity:.9;
}

.select, .btn{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:10px;
  background:#1a1b26;
  color:white;
  cursor:pointer;
  transition:.2s;
}

.btn:hover, .select:hover{
  background:#2a2b3d;
  transform:scale(1.02);
}

/* ===== CHAT ===== */
.chat{
  margin-left:270px;
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
  transition:.35s ease;
}

.chat.full{
  margin-left:0;
}

.topbar{
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  backdrop-filter:blur(10px);
}

.icon{
  width:40px;
  height:40px;
  border-radius:10px;
  border:none;
  background:#1a1b26;
  color:white;
  cursor:pointer;
  transition:.2s;
}

.icon:hover{
  background:#2a2b3d;
  transform:rotate(5deg);
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:75%;
  padding:14px;
  border-radius:14px;
  animation:pop .25s ease;
  line-height:1.4;
}

@keyframes pop{
  from{transform:translateY(10px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#6c63ff,#8a7dff);
}

.bot{
  align-self:flex-start;
  background:#1c1d2a;
  border:1px solid var(--border);
}

/* typing effect */
.typing::after{
  content:"...";
  animation:dots 1s infinite;
}

@keyframes dots{
  0%{content:"."}
  50%{content:".."}
  100%{content:"..."}
}

/* input */
.inputbar{
  display:flex;
  padding:15px;
  gap:10px;
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#11121a;
  color:white;
}

.send{
  width:50px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* mobile */
@media(max-width:800px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.show{transform:translateX(0);}
  .chat{margin-left:0;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="logo">⚡ AI ULTRA V2</div>

  <select id="model" class="select">
    <option value="openai/gpt-4o-mini">ChatGPT</option>
    <option value="google/gemini-pro">Gemini</option>
    <option value="anthropic/claude-3-haiku">Claude</option>
    <option value="meta-llama/llama-3-70b">LLaMA</option>
    <option value="mistralai/mixtral-8x7b">Mixtral</option>
  </select>

  <button class="btn" onclick="toggleDeep()">
    🧠 Deep Thinking
  </button>

  <button class="btn" onclick="clearChat()">
    🗑️ Clear Chat
  </button>

</div>

<!-- CHAT -->
<div class="chat" id="chat">

  <div class="topbar">
    <button class="icon" onclick="toggleSidebar()">
      <i class="ri-menu-line"></i>
    </button>
    <div>AI Ultra Chat V2</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputbar">
    <input id="input" placeholder="اكتب رسالة...">
    <button class="send" onclick="send()">
      <i class="ri-send-plane-fill"></i>
    </button>
  </div>

</div>

<script>
let deep=false;
const API_KEY="PUT_KEY_HERE";

/* sidebar toggle */
function toggleSidebar(){
  const sb=document.getElementById("sidebar");
  const chat=document.getElementById("chat");

  sb.classList.toggle("hide");
  chat.classList.toggle("full");
}

/* deep mode */
function toggleDeep(){
  deep=!deep;
  alert("Deep Mode: "+(deep?"ON":"OFF"));
}

/* clear */
function clearChat(){
  document.getElementById("messages").innerHTML="";
}

/* messages */
function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});
}

/* send */
async function send(){
  const input=document.getElementById("input");
  const msg=input.value;
  const model=document.getElementById("model").value;

  if(!msg) return;

  addMsg(msg,"user");
  input.value="";

  const loading=document.createElement("div");
  loading.className="msg bot typing";
  loading.innerText="Thinking";
  document.getElementById("messages").appendChild(loading);

  const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:model,
      messages:[
        {
          role:"system",
          content: deep
          ? "أجب بتحليل عميق جداً ومنظم"
          : "أجب بشكل مختصر وواضح"
        },
        {role:"user",content:msg}
      ]
    })
  });

  const data=await res.json();

  loading.remove();

  addMsg(
    data.choices?.[0]?.message?.content || "Error",
    "bot"
  );
}
</script>

</body>
</html>
