<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI V4 PRO</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#070812;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:16px;
  transition:.3s;
}

.sidebar.hide{transform:translateX(-100%);}

.btn,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#15162a;
  color:white;
}

/* CHAT */
.chat{
  margin-left:280px;
  flex:1;
  display:flex;
  flex-direction:column;
}

.chat.full{margin-left:0;}

.top{
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.menu{
  width:40px;height:40px;
  border-radius:10px;
  border:none;
  background:#15162a;
  color:white;
}

/* messages */
.msgs{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  padding:12px;
  border-radius:12px;
  max-width:75%;
  white-space:pre-wrap;
}

.user{
  background:linear-gradient(135deg,#6b5cff,#8a7dff);
  align-self:flex-end;
}

.bot{
  background:#15162a;
  border:1px solid rgba(255,255,255,0.08);
}

/* input */
.input{
  display:flex;
  padding:12px;
  gap:10px;
  border-top:1px solid rgba(255,255,255,0.08);
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#111224;
  color:white;
}

.send{
  width:50px;
  border:none;
  border-radius:12px;
  background:#7c5cff;
  color:white;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
  <h3>⚡ AI V4 PRO</h3>

  <select id="model">
    <option value="openai/gpt-4o-mini">ChatGPT</option>
    <option value="anthropic/claude-3-haiku">Claude</option>
    <option value="google/gemini-pro">Gemini</option>
    <option value="meta-llama/llama-3.1-8b-instruct">LLaMA</option>
  </select>

  <button class="btn" onclick="deep=!deep">🧠 Deep Mode</button>
  <button class="btn" onclick="clearChat()">🗑️ Clear</button>
</div>

<div class="chat" id="chat">

<div class="top">
  <button class="menu" onclick="toggle()"><i class="ri-menu-line"></i></button>
  <div>AI V4 PRO</div>
</div>

<div class="msgs" id="msgs"></div>

<div class="input">
  <input id="input" placeholder="اكتب...">
  <button class="send" onclick="send()"><i class="ri-send-plane-fill"></i></button>
</div>

</div>

<script>

const API_KEY = "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"; // 👈 هنا تحط مفتاحك
let deep=false;

function toggle(){
  document.getElementById("sidebar").classList.toggle("hide");
  document.getElementById("chat").classList.toggle("full");
}

function add(t,c){
  const d=document.createElement("div");
  d.className="msg "+c;
  d.innerText=t;
  document.getElementById("msgs").appendChild(d);
  d.scrollIntoView({behavior:"smooth"});
}

function clearChat(){
  document.getElementById("msgs").innerHTML="";
}

async function send(){
  const input=document.getElementById("input");
  const msg=input.value;
  const model=document.getElementById("model").value;

  if(!msg) return;

  add(msg,"user");
  input.value="";

  const bot=document.createElement("div");
  bot.className="msg bot";
  bot.innerText="...";
  document.getElementById("msgs").appendChild(bot);

  try{
    const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
      method:"POST",
      headers:{
        "Authorization":"Bearer "+API_KEY,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        model,
        messages:[
          {
            role:"system",
            content: deep
              ? "أجب بتحليل عميق ومنظم"
              : "أجب بشكل واضح ومختصر"
          },
          {role:"user",content:msg}
        ]
      })
    });

    const data=await res.json();

    bot.innerText =
      data?.choices?.[0]?.message?.content ||
      "خطأ: تأكد من API أو الموديل";

  }catch(e){
    bot.innerText="خطأ اتصال";
  }
}
</script>

</body>
</html>
