<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pro Chat</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
  display:flex;
  height:100vh;
  background:#0b0b0f;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#111118;
  padding:20px;
  border-right:1px solid #222;
}

.sidebar h2 {
  margin-bottom:20px;
}

select, button {
  width:100%;
  margin-bottom:15px;
  padding:12px;
  background:#1a1a24;
  border:none;
  color:white;
  border-radius:8px;
}

button:hover {
  background:#2a2a3a;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.msg {
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
  max-width:70%;
}

.user {
  background:#2a2a3f;
  align-self:flex-end;
}

.bot {
  background:#1c1c2b;
}

.input-box {
  display:flex;
  border-top:1px solid #222;
}

.input-box input {
  flex:1;
  padding:15px;
  background:#111;
  border:none;
  color:white;
}

.input-box button {
  width:120px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🤖 AI Panel</h2>

  <select id="model">
    <option value="openai/gpt-4o-mini">ChatGPT</option>
    <option value="google/gemini-pro">Gemini</option>
    <option value="anthropic/claude-3-haiku">Claude</option>
    <option value="meta-llama/llama-3-70b-instruct">LLaMA 3</option>
    <option value="mistralai/mixtral-8x7b">Mixtral</option>
  </select>

  <button onclick="toggleDeep()">🧠 Deep Thinking</button>
  <button onclick="clearChat()">🗑️ مسح المحادثة</button>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>
  </div>
</div>

<script>
let deepMode = false;
const API_KEY = "PUT_YOUR_OPENROUTER_KEY_HERE";

function toggleDeep(){
  deepMode = !deepMode;
  alert("Deep Mode: " + (deepMode ? "ON" : "OFF"));
}

function clearChat(){
  document.getElementById("messages").innerHTML="";
}

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

async function send(){
  const input = document.getElementById("input");
  const msg = input.value;
  const model = document.getElementById("model").value;

  if(!msg) return;

  addMsg(msg, "user");
  input.value="";

  addMsg("⏳ جاري التفكير...", "bot");

  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method:"POST",
    headers:{
      "Authorization":"Bearer " + API_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      model: model,
      messages: [
        {
          role:"system",
          content: deepMode
            ? "حلل بعمق واعطِ اجابة مفصلة جدًا"
            : "اجابة مختصرة"
        },
        {role:"user", content: msg}
      ]
    })
  });

  const data = await res.json();

  document.querySelector(".messages").lastChild.remove();

  addMsg(data.choices?.[0]?.message?.content || "خطأ", "bot");
}
</script>

</body>
</html>
