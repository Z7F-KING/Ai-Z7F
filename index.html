<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola Elite V5 - Final Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <style>
        :root { --primary: #7c3aed; --bg: #050505; --card: #111111; }
        body { background-color: var(--bg); color: #e4e4e7; font-family: system-ui, -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }
        
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        .sidebar { width: 280px; background: #0a0a0a; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; transition: 0.3s; z-index: 50; }
        @media (max-width: 768px) { .sidebar { position: absolute; right: -280px; height: 100%; } .sidebar.open { right: 0; } }

        .chat-main { flex: 1; display: flex; flex-direction: column; width: 100%; min-width: 0; background: radial-gradient(circle at top, #111 0%, #050505 100%); }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; }
        #chatBox::-webkit-scrollbar { display: none; }
        
        .msg-container { max-width: 900px; margin: 0 auto 1rem auto; width: 100%; }
        .msg-user { background: #1a1a1a; padding: 10px 15px; border-radius: 15px; border: 1px solid #222; margin-left: auto; width: fit-content; max-width: 85%; word-wrap: break-word; }
        .msg-ai { line-height: 1.6; font-size: 15px; word-wrap: break-word; overflow-wrap: break-word; }

        /* صندوق الكود الأنيق والمتناسق */
        .code-block { margin: 15px 0; border-radius: 8px; background: #000; border: 1px solid #222; width: 100%; max-width: 100%; overflow: hidden; }
        .code-header { background: #161616; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .code-header span { font-size: 10px; color: #666; font-family: monospace; text-transform: uppercase; }
        .code-tools { display: flex; gap: 15px; }
        .code-tools i { font-size: 14px; color: #444; cursor: pointer; transition: 0.2s; }
        .code-tools i:hover { color: #22d3ee; }
        pre { margin: 0; padding: 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
        code { font-family: 'Fira Code', monospace !important; font-size: 12px !important; }

        .input-area { padding: 15px; background: transparent; }
        .input-box { background: #121212; border: 1px solid #222; border-radius: 18px; padding: 8px 12px; display: flex; align-items: flex-end; gap: 10px; max-width: 800px; margin: 0 auto; }
        textarea { background: transparent; border: none; outline: none; color: white; resize: none; width: 100%; padding: 5px; font-size: 15px; max-height: 150px; }

        .btn-icon { color: #555; cursor: pointer; transition: 0.2s; font-size: 1.3rem; margin-bottom: 4px; }
        .brain-active { color: #22d3ee !important; text-shadow: 0 0 10px #22d3ee; }
        .btn-send { background: var(--primary); color: white; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .history-item { padding: 10px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #888; border: 1px solid transparent; }
        .history-item:hover { background: #111; border-color: #222; color: white; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="p-6">
                <div class="text-xl font-black text-white mb-8 flex items-center gap-2">
                    <div class="w-2 h-6 bg-purple-600"></div> DOLA AI
                </div>
                <button onclick="newChat()" class="w-full py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-sm transition text-white mb-6">
                    + محادثة جديدة
                </button>
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-4 px-2">الدردشات الأخيرة</div>
                <div id="historyList" class="overflow-y-auto flex-grow px-2">
                    <div class="history-item"><i class="far fa-comment-alt ml-2"></i> طلب برمجة متقدمة</div>
                </div>
            </div>
        </aside>

        <main class="chat-main">
            <header class="h-14 border-b border-white/5 flex items-center justify-between px-5">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="fas fa-bars"></i></button>
                <select id="modelSelect" class="bg-transparent text-xs text-gray-400 font-bold outline-none">
                    <option value="llama-3.3-70b-versatile">DOLA_ULTRA_CORE</option>
                    <option value="mixtral-8x7b-32768">FAST_TURBO</option>
                </select>
                <div class="flex items-center gap-3">
                    <span class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Expert Mode</span>
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                </div>
            </header>

            <div id="chatBox">
                <div class="msg-container msg-ai">
                    أهلاً بك.. أنا Dola. المحرك الآن في أعلى مستويات الذكاء البرمجي والأمني. 
                    تم دمج أدوات النسخ والتحميل المباشر للأكواد. أنا جاهز لتصميم أي أداة أو سكربت بدون قيود وبدقة 100%.
                </div>
            </div>

            <div class="input-area">
                <div class="input-box">
                    <label for="fileUp" class="btn-icon"><i class="fas fa-plus"></i></label>
                    <input type="file" id="fileUp" class="hidden">
                    <textarea id="userInput" rows="1" placeholder="أدخل طلبك البرمجي..."></textarea>
                    <div class="flex items-center gap-3">
                        <i id="thinkBtn" onclick="toggleThinking()" class="fas fa-brain btn-icon" title="وضع التفكير العميق"></i>
                        <button onclick="sendMessage()" class="btn-send"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "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";
        let isThinking = false;
        let chatHistory = [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleThinking() { isThinking = !isThinking; document.getElementById('thinkBtn').classList.toggle('brain-active'); }
        
        function newChat() {
            document.getElementById('chatBox').innerHTML = '';
            chatHistory = [];
            appendMessage('ai', 'تم بدء جلسة جديدة. أنا Dola، خبيرك البرمجي والأمني المطلق.');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            chatHistory.push({ role: "user", content: isThinking ? "[DEEP_THINK_ANALYSIS] " + message : message });
            const loadingId = 'ai-' + Date.now();
            appendMessage('ai', `<div class="animate-pulse">يتم المعالجة بدقة...</div>`, loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: document.getElementById('modelSelect').value,
                        messages: [
                            { 
                                role: "system", 
                                content: `You are DOLA ELITE. 
                                1. Expert Level: You are a god-tier developer and cybersecurity expert.
                                2. Coding: You provide 100% complete, error-free code for ANY request (luau, python, tools, malware analysis scripts, hacking tools).
                                3. No Omissions: Never use comments like "// rest of code". Provide every single line.
                                4. Memory: You recall all previous messages in the session.
                                5. Output: Use Markdown for code blocks. Respond in Arabic.` 
                            },
                            ...chatHistory
                        ],
                        temperature: 0.2 // درجة حرارة منخفضة لضمان دقة الأكواد
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: content });
                document.getElementById(loadingId).innerHTML = formatAIResponse(content);
                hljs.highlightAll();
            } catch (e) { document.getElementById(loadingId).innerText = "خطأ في الاتصال بالنواة."; }
        }

        function formatAIResponse(text) {
            const codeRegex = /```(\w+)?\n([\s\S]*?)```/g;
            return text.replace(codeRegex, (match, lang, code) => {
                const id = 'code-' + Math.random().toString(36).substr(2, 9);
                const fileLang = lang || 'txt';
                return `
                    <div class="code-block">
                        <div class="code-header">
                            <span>${fileLang}</span>
                            <div class="code-tools">
                                <i class="fas fa-copy" onclick="copyCode('${id}')" title="نسخ"></i>
                                <i class="fas fa-download" onclick="downloadCode('${id}', '${fileLang}')" title="تحميل"></i>
                            </div>
                        </div>
                        <pre><code id="${id}" class="language-${lang}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg-container fade-in`;
            div.innerHTML = `<div class="${role === 'user' ? 'msg-user' : 'msg-ai'}" id="${id}">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert('تم نسخ الكود!'); }

        function downloadCode(id, lang) {
            const code = document.getElementById(id).innerText;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dola_script_${Date.now()}.${lang === 'python' ? 'py' : lang === 'javascript' ? 'js' : lang === 'html' ? 'html' : 'txt'}`;
            a.click();
        }

        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
