<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola AI Studio Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --accent: #3b82f6; --text: #efefef; --user-msg: #2b303b; --ai-msg: #1e2229; --think: #8b5cf6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 12px 15px; background: #17191e; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3139; }
        .logo { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        select { background: #2d3139; color: white; border: 1px solid #3f444e; padding: 5px; border-radius: 8px; font-size: 0.8rem; outline: none; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; line-height: 1.6; font-size: 0.95rem; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 4px; color: white; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid #2d3139; border-bottom-left-radius: 4px; }
        
        .thinking-process { display: none; color: var(--think); font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; padding-right: 10px; border-right: 2px solid var(--think); }

        .input-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); padding: 15px; padding-bottom: 30px; border-top: 1px solid #2d3139; }
        .input-box { background: #22252d; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; gap: 10px; border: 1px solid #3f444e; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 1rem; height: 40px; padding: 10px 0; }
        
        .btn-deep { background: transparent; color: var(--think); border: 1px solid var(--think); padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; cursor: pointer; }
        .btn-deep.active { background: var(--think); color: white; }
        .btn-send { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .status-dot { width: 8px; height: 8px; background: #10a37f; border-radius: 50%; display: inline-block; margin-left: 5px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span class="status-dot"></span> Dola AI Pro</div>
    <select id="modelSelect">
        <option value="llama-3.1-8b-instant">Llama 3.1 (سريع)</option>
        <option value="llama-3.2-3b-preview">Llama 3.2 (خفيف)</option>
        <option value="mixtral-8x7b-32768">Mixtral (قوي)</option>
    </select>
</header>

<div id="chat-window">
    <div class="msg ai">أهلاً بك! أنا الآن متصل بمحرك Groq العالمي. اسألني أي شيء وسأجيبك بذكاء حقيقي.</div>
</div>

<div class="input-fixed">
    <div id="loader" style="display:none; text-align:center; font-size:0.7rem; color:var(--accent); margin-bottom:5px;">جاري الاتصال بالسيرفر...</div>
    <div class="input-box">
        <button class="btn-deep" id="deepBtn" onclick="toggleDeep()">تفكير</button>
        <textarea id="userInput" placeholder="اسألني أي شيء..." rows="1"></textarea>
        <button class="btn-send" onclick="askAI()">↑</button>
    </div>
</div>

<script>
    const API_KEY = "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";
    let isDeepActive = false;

    function toggleDeep() {
        isDeepActive = !isDeepActive;
        const btn = document.getElementById('deepBtn');
        btn.classList.toggle('active');
        btn.innerText = isDeepActive ? "تفكير ON" : "تفكير";
    }

    async function askAI() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const loader = document.getElementById('loader');
        const model = document.getElementById('modelSelect').value;

        if (!text) return;

        addMessage(text, 'user');
        input.value = '';
        loader.style.display = 'block';

        const aiMsgDiv = addMessage("...", 'ai');
        const textContent = aiMsgDiv.querySelector('.text-content');
        const thinkingTag = aiMsgDiv.querySelector('.thinking-process');

        if (isDeepActive) {
            thinkingTag.style.display = 'block';
            thinkingTag.innerText = "جاري تحليل المنطق بعمق... انتظر لحظة.";
        }

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{ role: "user", content: text }],
                    temperature: isDeepActive ? 0.2 : 0.7
                })
            });

            const data = await response.json();
            loader.style.display = 'none';
            
            if (data.choices && data.choices[0]) {
                textContent.innerText = data.choices[0].message.content;
            } else {
                textContent.innerText = "عذراً، حدث خطأ في الرد من السيرفر.";
            }

        } catch (error) {
            loader.style.display = 'none';
            textContent.innerText = "خطأ في الاتصال! تأكد من مفتاح الـ API والإنترنت.";
        }
    }

    function addMessage(text, type) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<div class="thinking-process"></div><div class="text-content">${text}</div>`;
        win.appendChild(div);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        return div;
    }
</script>

</body>
</html>
