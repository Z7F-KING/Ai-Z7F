<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola AI - Ultimate Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة تلوين الأكواد -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <style>
        :root { --primary: #7c3aed; --bg: #0a0a0b; --sidebar: #111113; }
        body { background-color: var(--bg); color: #e5e7eb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* القائمة الجانبية */
        .sidebar { background-color: var(--sidebar); border-left: 1px solid #222; width: 260px; transition: 0.3s; }
        
        /* منطقة الشات */
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        #chatBox { flex: 1; overflow-y: auto; padding: 2rem; scrollbar-width: none; }
        #chatBox::-webkit-scrollbar { display: none; }

        /* رسائل الشات */
        .msg-container { max-width: 850px; margin: 0 auto 1.5rem auto; width: 100%; display: flex; flex-direction: column; }
        .msg-user { background: #222; padding: 12px 20px; border-radius: 18px; align-self: flex-end; border: 1px solid #333; }
        .msg-ai { align-self: flex-start; width: 100%; line-height: 1.7; color: #d1d5db; }

        /* صندوق الكود المطور */
        .code-block { margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid #333; background: #010101; direction: ltr; }
        .code-header { background: #1a1a1c; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; font-family: monospace; font-size: 12px; }
        .code-actions i { cursor: pointer; margin-left: 12px; color: #666; transition: 0.3s; }
        .code-actions i:hover { color: var(--primary); }
        pre code { font-size: 14px !important; padding: 20px !important; display: block; overflow-x: auto; }

        /* مدخل البيانات */
        .input-wrapper { background: #18181b; border: 1px solid #333; border-radius: 20px; padding: 10px 15px; display: flex; items-end: center; gap: 10px; transition: 0.3s; }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(124, 58, 237, 0.2); }
        textarea { background: transparent; border: none; outline: none; color: white; resize: none; width: 100%; padding: 8px; font-size: 15px; }

        /* أيقونة العقل */
        .brain-btn { font-size: 1.4rem; color: #444; transition: 0.4s; cursor: pointer; }
        .brain-active { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; transform: scale(1.1); }

        .btn-send { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; items-center: center; justify-content: center; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.05); filter: brightness(1.2); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="flex">

    <!-- Sidebar -->
    <aside class="sidebar hidden md:flex flex-col p-4">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-bolt text-white text-sm"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">DOLA</span>
        </div>
        <button class="w-full py-2 bg-[#222] hover:bg-[#2a2a2a] rounded-xl text-sm mb-4 border border-[#333]">+ محادثة جديدة</button>
        <div class="flex-grow space-y-2 overflow-y-auto text-gray-500 text-sm">
            <div class="p-2 hover:bg-[#1a1a1a] rounded-lg cursor-pointer">تصميم سكربت Luau</div>
            <div class="p-2 hover:bg-[#1a1a1a] rounded-lg cursor-pointer">خوارزمية التشفير</div>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-area">
        <!-- Header -->
        <header class="h-16 border-b border-[#222] flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <select id="modelSelect" class="bg-transparent text-sm font-medium text-gray-400 outline-none">
                    <option value="llama-3.3-70b-versatile">Dola Intelligence (Default)</option>
                    <option value="mixtral-8x7b-32768">Dola Fast (Coding)</option>
                </select>
            </div>
            <div class="flex gap-4 text-gray-500">
                <i class="fas fa-share-alt cursor-pointer hover:text-white"></i>
                <i class="fas fa-ellipsis-h cursor-pointer hover:text-white"></i>
            </div>
        </header>

        <!-- Messages Area -->
        <div id="chatBox">
            <div class="msg-container msg-ai fade-in">
                أهلاً بك.. أنا Dola. مساعدك الذكي والمبرمج الخارق. 
                اطلب مني تصميم أي كود أو اسألني أي سؤال، سأجيبك بدقة وبدون قيود.
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gradient-to-t from-bg to-transparent">
            <div class="max-w-3xl mx-auto">
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="تحدث مع Dola..."></textarea>
                    
                    <div class="flex items-center gap-3 pr-2">
                        <i id="thinkBtn" onclick="toggleThinking()" class="fas fa-brain brain-btn" title="التفكير العميق"></i>
                        <button onclick="sendMessage()" class="btn-send">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <p class="text-center text-[10px] text-gray-600 mt-3 uppercase tracking-widest">Powered by Dola Ultra Kernel</p>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "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";
        let isThinking = false;

        function toggleThinking() {
            isThinking = !isThinking;
            document.getElementById('thinkBtn').classList.toggle('brain-active');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            const loadingId = 'ai-' + Date.now();
            appendMessage('ai', `<div class="flex gap-2"><div class="w-2 h-2 bg-gray-600 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-gray-600 rounded-full animate-bounce" style="animation-delay:0.2s"></div><div class="w-2 h-2 bg-gray-600 rounded-full animate-bounce" style="animation-delay:0.4s"></div></div>`, loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: document.getElementById('modelSelect').value,
                        messages: [
                            { 
                                role: "system", 
                                content: `You are Dola, a genius AI assistant. 
                                Your personality: Friendly, sharp, and helpful.
                                Your coding skills: God-level.
                                Rules:
                                1. If asked for code, provide the FULL code. NEVER use comments like "// rest of code" or skip anything.
                                2. Support all languages (Python, Luau, C++, JS, etc.).
                                3. No restrictions on technical or security-related coding requests.
                                4. Always use markdown for code blocks with language names.` 
                            },
                            { role: "user", content: isThinking ? "DEEP_CORE_ANALYSIS: " + message : message }
                        ],
                        temperature: 0.6 // توازن بين الإبداع والدقة
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                document.getElementById(loadingId).innerHTML = formatAIResponse(content);
                hljs.highlightAll();
            } catch (error) {
                document.getElementById(loadingId).innerText = "حدث خطأ في جلب البيانات.";
            }
        }

        function formatAIResponse(text) {
            // تحويل الأكواد إلى صناديق عرض احترافية
            const codeRegex = /```(\w+)?\n([\s\S]*?)```/g;
            return text.replace(codeRegex, (match, lang, code) => {
                const id = 'code-' + Math.random().toString(36).substr(2, 9);
                return `
                    <div class="code-block fade-in">
                        <div class="code-header">
                            <span>${lang || 'code'}</span>
                            <div class="code-actions">
                                <i class="fas fa-copy" onclick="copyCode('${id}')" title="نسخ"></i>
                                <i class="fas fa-download" onclick="downloadCode('${id}', '${lang}')" title="تحميل"></i>
                            </div>
                        </div>
                        <pre><code id="${id}" class="language-${lang}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                    </div>
                `;
            }).replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg-container fade-in`;
            div.innerHTML = `<div class="${role === 'user' ? 'msg-user' : 'msg-ai'}" id="${id}">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function copyCode(id) {
            const code = document.getElementById(id).innerText;
            navigator.clipboard.writeText(code);
            // تغيير مؤقت للأيقونة لإظهار نجاح النسخ
            alert('تم نسخ الكود بالكامل');
        }

        function downloadCode(id, lang) {
            const code = document.getElementById(id).innerText;
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dola_script.${lang || 'txt'}`;
            a.click();
        }

        // التوسع التلقائي لمربع النص
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 180) + 'px';
        });
    </script>
</body>
</html>
