<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header{padding:15px;text-align:center;background:#020617;font-size:20px;}
#chat{height:75vh;overflow-y:auto;padding:10px;}
.message{margin:10px 0;padding:10px;border-radius:10px;}
.user{background:#1e293b;text-align:right;}
.bot{background:#2563eb;text-align:left;}
#inputBox{display:flex;padding:10px;background:#020617;}
input{flex:1;padding:10px;border-radius:8px;border:none;}
button{margin-left:10px;padding:10px 20px;border:none;background:#2563eb;color:white;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>
<header>🤖 AI Chat</header>
<div id="chat"></div>
<div id="inputBox">
<input id="msg" placeholder="اكتب رسالتك...">
<button onclick="send()">إرسال</button>
</div>
<script>
async function send() {
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");
    if(!input.value) return;
    chat.innerHTML += `<div class="message user">${input.value}</div>`;
    const userText = input.value;
    input.value = "";
    const res = await fetch("http://localhost:3000/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:userText})
    });
    const data = await res.json();
    chat.innerHTML += `<div class="message bot">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
