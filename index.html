<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z7F TEAM | DANCE PLAYER ELITE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* خلفية متحركة */
        .animated-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.05) 0%, transparent 25%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 25%);
            animation: bgMove 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes bgMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, -20px); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* شعار الفريق المتحرك */
        .team-header {
            text-align: center;
            margin: 30px 0 50px;
            position: relative;
        }

        .glowing-title {
            font-size: 4.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ffd700, #ff8c00, #ff0080, #8000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            animation: titleGlow 3s ease-in-out infinite;
            letter-spacing: 5px;
        }

        @keyframes titleGlow {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(20deg); }
        }

        .team-subtitle {
            font-size: 1.8rem;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* بطاقات القيم المدخلة */
        .input-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 20px 40px rgba(255,215,0,0.2);
        }

        .card label {
            display: block;
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .card input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        /* حقل اللاعبين الديناميكي */
        .players-section {
            grid-column: 1 / -1;
        }

        .id-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .id-container input {
            flex: 1;
        }

        .btn-add {
            width: 60px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add:hover {
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 30px #ffd700;
        }

        /* شبكة الإيموشنات المتطورة */
        .emotes-section {
            margin: 50px 0;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
            color: #ffd700;
            position: relative;
        }

        .section-title::before,
        .section-title::after {
            content: "★";
            margin: 0 20px;
            color: #ff8c00;
            animation: starSpin 4s linear infinite;
        }

        @keyframes starSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .emotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .emote-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .emote-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,215,0,0.2), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
            opacity: 0;
        }

        .emote-card:hover {
            border-color: #ffd700;
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 20px 30px rgba(255,215,0,0.3);
        }

        .emote-card:hover::before {
            opacity: 1;
            left: 100%;
        }

        .emote-card img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .emote-card:hover img {
            transform: scale(1.1);
        }

        /* زر التيليجرام المميز */
        .telegram-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
        }

        .telegram-link {
            display: flex;
            align-items: center;
            background: linear-gradient(45deg, #0088cc, #00a8ff);
            padding: 15px 30px;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0,136,204,0.5);
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .telegram-link:hover {
            transform: scale(1.1) translateX(-10px);
            box-shadow: 0 20px 40px rgba(0,136,204,0.8);
            border-color: white;
        }

        .telegram-link i {
            font-size: 2rem;
            animation: telegramPulse 2s infinite;
        }

        @keyframes telegramPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .username {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        /* النافذة المنبثقة الفاخرة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            border: 3px solid #ffd700;
            animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 400px;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.3) rotate(-180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        .modal-content i {
            font-size: 5rem;
            color: #00ff88;
            margin-bottom: 20px;
            animation: successBounce 1s infinite;
        }

        @keyframes successBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .modal-content h2 {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .btn-close {
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid white;
        }

        .btn-close:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ffd700;
        }

        /* تصميم متجاوب */
        @media (max-width: 768px) {
            .glowing-title {
                font-size: 2.5rem;
            }
            
            .team-subtitle {
                font-size: 1.2rem;
            }
            
            .telegram-link span:not(.username) {
                display: none;
            }
            
            .telegram-link {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <div class="container">
        <div class="team-header">
            <h1 class="glowing-title">Z7F TEAM</h1>
            <div class="team-subtitle">⚡ DANCE PLAYER ELITE ⚡</div>
        </div>

        <div class="input-cards">
            <div class="card">
                <label><i class="fas fa-code"></i> كود الفريق</label>
                <input type="text" id="teamCode" placeholder="أدخل كود الفريق ...">
            </div>

            <div class="card players-section">
                <label><i class="fas fa-users"></i> معرفات اللاعبين</label>
                <div id="idInputs">
                    <div class="id-container">
                        <input type="text" class="player-id" placeholder="أدخل معرف اللاعب ...">
                        <button class="btn-add" onclick="addNewIdInput()">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="emotes-section">
            <h2 class="section-title">اختر الإيموشن</h2>
            <div class="emotes-grid" id="emotesGrid"></div>
        </div>
    </div>

    <!-- زر التيليجرام -->
    <div class="telegram-button">
        <a href="https://t.me/hama_DEV" target="_blank" class="telegram-link">
            <i class="fab fa-telegram-plane"></i>
            <span>تواصل معنا</span>
            <span class="username">@hama_DEV</span>
        </a>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-check-circle"></i>
            <h2>تم بنجاح</h2>
            <p>✔ تم إرسال الإيموشن بنجاح</p>
            <button class="btn-close" onclick="closeModal()">حسناً</button>
        </div>
    </div>

    <script>
        const rawIds = [
            "909000001", "909000002", "909000003", "909000004", "909000005", "909000006", "909000007", "909000008", "909000009", "909000010",
            "909000011", "909000012", "909000013", "909000014", "909000015", "909000016", "909000017", "909000018", "909000019", "909000020",
            "909000021", "909000022", "909000023", "909000024", "909000025", "909000026", "909000027", "909000028", "909000029", "909000031",
            "909000032", "909000033", "909000034", "909000035", "909000036", "909000037", "909000038", "909000039", "909000040", "909000041",
            "909000042", "909000043", "909000044", "909000045", "909000046", "909000047", "909000048", "909000049", "909000051", "909000052"
        ];

        const uniqueEmotes = [...new Set(rawIds)];
        const grid = document.getElementById('emotesGrid');

        uniqueEmotes.forEach(id => {
            const card = document.createElement('div');
            card.className = 'emote-card';
            card.innerHTML = `<img src="https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${id}.png" loading="lazy" alt="Emote ${id}">`;
            card.onclick = () => sendDance(id);
            grid.appendChild(card);
        });

        function addNewIdInput() {
            const container = document.getElementById('idInputs');
            if(container.getElementsByClassName('id-container').length < 5) {
                const div = document.createElement('div');
                div.className = 'id-container';
                div.innerHTML = `<input type="text" class="player-id" placeholder="أدخل معرف اللاعب ...">`;
                container.appendChild(div);
            }
        }

        function sendDance(emoteId) {
            const tc = document.getElementById('teamCode').value;
            const ids = Array.from(document.getElementsByClassName('player-id')).map(i => i.value);
            
            if(!tc || !ids[0]) { 
                alert("الرجاء إدخال كود الفريق ومعرف اللاعب أولاً!"); 
                return; 
            }

            let url = `http://217.160.125.125:13699/join?tc=${tc}`;
            ids.forEach((id, index) => { 
                if(id) url += `&uid${index+1}=${id}`; 
            });
            url += `&emote_id=${emoteId}`;

            showModal();
            fetch(url, { mode: 'no-cors' }).catch(() => {});
        }

        function showModal() { 
            document.getElementById('successModal').style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('successModal').style.display = 'none'; 
        }
    </script>
</body>
</html>
