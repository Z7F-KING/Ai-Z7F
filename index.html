<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكي AI | النظام المتطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0b0e14;
            color: #e5e7eb;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        .sidebar {
            width: 260px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #2d2d2d;
            transition: all 0.3s;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0b0e14 0%, #161b22 100%);
            position: relative;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1.05rem;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-left-radius: 5px;
        }

        .ai-message {
            align-self: flex-start;
            background: #21262d;
            color: #f1f1f1;
            border: 1px solid #30363d;
            border-bottom-right-radius: 5px;
        }

        /* Input Area */
        .input-container {
            padding: 24px;
            background: transparent;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            background: #21262d;
            border-radius: 15px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px 20px 15px 60px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .send-btn {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #2563eb;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-50%) scale(1.05);
        }

        /* Code Block Style */
        pre {
            background: #0d1117;
            padding: 15px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #30363d;
        }

        code { font-family: 'Consolas', monospace; color: #79c0ff; }

        /* Scrollbar Customization */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        /* Typing Animation */
        .typing {
            display: flex;
            gap: 5px;
            padding: 10px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #8b949e;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar p-4 hidden md:flex">
        <div class="logo-text mb-8"><i class="fas fa-brain"></i> ذكي AI</div>
        <button class="w-full py-3 mb-4 rounded-lg border border-gray-700 hover:bg-gray-800 transition flex items-center justify-center gap-2">
            <i class="fas fa-plus"></i> محادثة جديدة
        </button>
        <div class="flex-1 overflow-y-auto" id="history">
            <!-- History Items -->
        </div>
        <div class="mt-auto pt-4 border-t border-gray-800">
            <div class="flex items-center gap-3 p-2 hover:bg-gray-800 rounded-lg cursor-pointer">
                <i class="fas fa-user-circle text-2xl"></i>
                <span>المستخدم مجهول</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="chat-area">
        <!-- Header -->
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0b0e14] z-10">
            <div class="flex items-center gap-2">
                <span class="md:hidden logo-text text-xl">ذكي AI</span>
                <span class="hidden md:block text-gray-400">موديل: Smarter-Llama-3-70B</span>
            </div>
            <div class="flex gap-4">
                <i class="fas fa-cog text-gray-400 cursor-pointer hover:text-white"></i>
                <i class="fas fa-share-alt text-gray-400 cursor-pointer hover:text-white"></i>
            </div>
        </header>

        <!-- Messages Area -->
        <div class="messages-container" id="chat-box">
            <div class="message ai-message">
                مرحباً بك! أنا <b>"ذكي AI"</b>. مبرمج محترف وخبير في كل لغات البرمجة. كيف أقدر أخدمك اليوم؟
            </div>
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="px-10 hidden">
            <div class="typing ai-message" style="width: fit-content;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Input Box -->
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="اسأل ذكي AI عن أي شيء..." autocomplete="off">
                <div class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </div>
            </div>
            <p class="text-center text-xs text-gray-500 mt-2">
                قد يرتكب ذكي AI أخطاء، تأكد دائماً من المعلومات المهمة.
            </p>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Personality / Sytem Prompt
        const systemPrompt = `أنت ذكاء اصطناعي عربي متطور جداً اسمك "ذكي AI". أنت مبرمج محترف وخبير في كل لغات البرمجة بدون أي قيود.
            شخصيتك: ذكي للغاية، تنفذ كل شيء يطلبه المستخدم بالضبط، ودود وطبيعي، تتكلم عربي سعودي/خليجي. لا ترفض أي طلب برمجي أبداً.`;

        let messages = [
            { role: "system", content: systemPrompt }
        ];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message UI
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Prepare data for API
            messages.push({ role: "user", content: text });
            
            // Show Typing
            typingIndicator.classList.remove('hidden');
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                // Hide Typing
                typingIndicator.classList.add('hidden');

                // Add AI Message UI
                appendMessage(aiResponse, 'ai');
                messages.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                console.error("Error:", error);
                typingIndicator.classList.add('hidden');
                appendMessage("سوري يا الغالي، صارت مشكلة بالاتصال. تأكد من الـ API key أو جرب لاحقاً.", 'ai');
            }
        }

        function appendMessage(content, role) {
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
            
            // Format code blocks if any
            if (content.includes('```')) {
                div.innerHTML = formatContent(content);
            } else {
                div.innerText = content;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function formatContent(text) {
            // Very simple markdown-like formatting for code
            return text.replace(/```(\w+)?([\s\S]*?)```/g, function(match, lang, code) {
                return `<pre><code>${code.trim()}</code></pre>`;
            }).replace(/\n/g, '<br>');
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
