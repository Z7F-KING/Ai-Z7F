<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLA-X PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { background:#0d1117; color:#fff; margin:0; overflow:hidden; }
</style>
</head>

<body class="h-screen flex flex-col">

<!-- Sidebar -->
<div id="sidebar" class="fixed top-0 right-0 h-full w-72 bg-[#0d1117] border-l border-[#30363d] translate-x-full transition">
    <button onclick="createNewChat()">محادثة جديدة</button>
    <div id="chatList"></div>
</div>

<!-- Header -->
<header class="h-14 flex justify-between items-center px-4 border-b border-[#30363d]">
    <button onclick="toggleSidebar()">☰</button>
    <h1>DOLA-X</h1>
</header>

<!-- Chat -->
<main id="chatBox" class="flex-1 overflow-y-auto p-4"></main>

<!-- Input -->
<div class="p-3 border-t border-[#30363d]">
    <textarea id="userInput" class="w-full bg-black p-2"></textarea>
    <button onclick="handleSend()">إرسال</button>
</div>

<script>

// 🔐 مؤقت بدل ما يكون مكشوف
const API_KEY = prompt("حط API KEY");

let currentChatId = Date.now() + Math.random();
let allChats = JSON.parse(localStorage.getItem('dola_v3_chats')) || {};

lucide.createIcons();

// Sidebar
function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('translate-x-full');
    renderChatList();
}

// إنشاء محادثة
function createNewChat(){
    currentChatId = Date.now() + Math.random();

    document.getElementById('chatBox').innerHTML = `
        <div id="welcomeScreen">جاهز...</div>
    `;
}

// عرض المحادثات
function renderChatList(){
    const list = document.getElementById('chatList');
    list.innerHTML = '';

    Object.keys(allChats).forEach(id=>{
        const div = document.createElement('div');
        div.innerText = allChats[id][0]?.content || "محادثة";
        div.onclick = ()=>{
            currentChatId = id;
            loadChat(id);
        };
        list.appendChild(div);
    });
}

// تحميل محادثة
function loadChat(id){
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = '';

    allChats[id].forEach(msg=>{
        displayMsg(msg.role, msg.content);
    });
}

// إرسال
async function handleSend(){
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if(!text) return;

    displayMsg('user', text);
    input.value = '';

    if(!allChats[currentChatId]) allChats[currentChatId] = [];
    allChats[currentChatId].push({role:'user', content:text});

    try{
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Authorization":"Bearer "+API_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"llama3-70b-8192",
                messages: allChats[currentChatId]
            })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content;

        displayMsg('assistant', reply);
        allChats[currentChatId].push({role:'assistant', content:reply});

        // 💾 حماية التخزين
        try{
            const keys = Object.keys(allChats);
            if(keys.length > 20){
                delete allChats[keys[0]];
            }
            localStorage.setItem('dola_v3_chats', JSON.stringify(allChats));
        }catch(e){
            localStorage.clear();
        }

    }catch(err){
        displayMsg('assistant', 'خطأ: '+err.message);
    }
}

// عرض الرسائل (XSS بدون تعديل مثل طلبك)
function displayMsg(role, content){
    const chatBox = document.getElementById('chatBox');

    const div = document.createElement('div');
    div.innerHTML = `<b>${role}:</b> ${content}`;

    chatBox.appendChild(div);
}

// Enter للإرسال
document.getElementById('userInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        handleSend();
    }
});

</script>

</body>
</html>
