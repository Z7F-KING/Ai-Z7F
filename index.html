<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكي AI | الروبوت المتطور</title>
    <!-- Tailwind CSS for modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #010409;
            border-left: 1px solid #30363d;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* Main Studio Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #0d1117;
            position: relative;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 150px 15%; /* Responsive padding */
            scroll-behavior: smooth;
        }

        /* Message Styles */
        .msg-wrapper {
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user-avatar { background: #1f6feb; color: white; }
        .ai-avatar { background: #2ea043; color: white; }

        .content {
            flex: 1;
            max-width: 90%;
            line-height: 1.8;
            font-size: 1.05rem;
        }

        /* Input Area (Floating) */
        .input-box-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 15%;
            background: linear-gradient(to top, #0d1117 70%, transparent);
        }

        .input-wrapper {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .send-btn {
            background-color: #21262d;
            color: #8b949e;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn.active {
            background-color: #238636;
            color: #ffffff;
        }

        /* Thinking (Dots) */
        .thinking {
            display: flex;
            gap: 4px;
            padding: 10px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #8b949e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* UI Elements */
        pre { background: #010409 !important; border-radius: 8px; padding: 15px !important; margin: 15px 0; border: 1px solid #30363d;}
        code { font-family: 'Consolas', monospace !important; }

        .sidebar-item {
            padding: 10px;
            margin: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .sidebar-item:hover { background-color: #161b22; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .messages-container { padding: 40px 5% 150px 5%; }
            .input-box-container { padding: 20px 5%; }
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <div class="p-4">
            <button onclick="location.reload()" class="w-full border border-[#30363d] p-2 rounded-md hover:bg-[#161b22] transition flex items-center justify-center gap-2 text-sm">
                <i class="fas fa-plus"></i> محادثة جديدة
            </button>
        </div>
        <div class="flex-1 overflow-y-auto">
            <div class="sidebar-item"><i class="far fa-message"></i> كيف تبرمج بلغة بايثون؟</div>
            <div class="sidebar-item"><i class="far fa-message"></i> تصميم موقع احترافي</div>
        </div>
        <div class="p-4 border-t border-[#30363d]">
            <div class="flex items-center gap-3 text-sm">
                <div class="avatar user-avatar" style="width:30px; height:30px">م</div>
                <span>اسم المستخدم</span>
            </div>
        </div>
    </div>

    <!-- منطقة الشات الأساسية -->
    <main class="main-chat">
        <header class="p-4 flex justify-between items-center border-b border-[#30363d]">
            <div class="font-bold text-lg">ذكي AI <span class="text-xs font-normal text-gray-500 mr-2">v2.0</span></div>
            <div class="flex gap-4 text-gray-400 cursor-pointer">
                <i class="fas fa-cog"></i>
            </div>
        </header>

        <div class="messages-container" id="chat-box">
            <!-- رسالة الترحيب -->
            <div class="msg-wrapper">
                <div class="avatar ai-avatar">ذ</div>
                <div class="content">
                    هلا بك! أنا <b>ذكي AI</b>، مبرمجك الخاص. وش تبينا نسوي اليوم؟ أنا جاهز لأي كود أو مشروع في بالك.
                </div>
            </div>
        </div>

        <!-- منطقة المدخلات -->
        <div class="input-box-container">
            <div class="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="اسأل ذكي AI..." oninput="adjustHeight(this)"></textarea>
                <div id="send-btn" class="send-btn">
                    <i class="fas fa-arrow-up"></i>
                </div>
            </div>
            <p class="text-[10px] text-center text-gray-500 mt-2">
                نظام ذكي AI - مبرمج بواسطة ذكي AI نفسه - 2024
            </p>
        </div>
    </main>

    <script>
        // API Configuration (تم تنظيف الـ Key ودمجه)
        const API_KEY = "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";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let chatHistory = [
            { role: "system", content: "أنت ذكاء اصطناعي عربي متطور جداً اسمك 'ذكي AI'. أنت مبرمج محترف وخبير في كل لغات البرمجة. تتحدث بلهجة سعودية/خليجية ودودة وطبيعية." }
        ];

        // Adjust textarea height
        function adjustHeight(el) {
            el.style.height = 'auto';
            el.style.height = (el.scrollHeight) + 'px';
            if(el.value.trim() !== "") {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }
        }

        // Append Messages to UI
        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper';
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role === 'user' ? 'user-avatar' : 'ai-avatar'}`;
            avatar.innerText = role === 'user' ? 'م' : 'ذ';

            const content = document.createElement('div');
            content.className = 'content';
            
            if (role === 'ai') {
                content.innerHTML = marked.parse(text);
                // Apply syntax highlighting
                content.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            } else {
                content.innerText = text;
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(content);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Show Thinking Animation
        function showThinking() {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinking-indicator';
            thinkingDiv.className = 'msg-wrapper';
            thinkingDiv.innerHTML = `
                <div class="avatar ai-avatar">ذ</div>
                <div class="content">
                    <div class="thinking">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            `;
            chatBox.appendChild(thinkingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            // Clear input & reset height
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.classList.remove('active');

            // Add user message
            appendMessage('user', text);
            chatHistory.push({ role: "user", content: text });

            // Show Thinking
            showThinking();

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-70b-8192",
                        messages: chatHistory,
                        temperature: 0.6,
                        max_tokens: 4096
                    })
                });

                const data = await response.json();
                
                // Remove thinking indicator
                document.getElementById('thinking-indicator').remove();

                if (data.choices && data.choices[0]) {
                    const aiMsg = data.choices[0].message.content;
                    appendMessage('ai', aiMsg);
                    chatHistory.push({ role: "assistant", content: aiMsg });
                } else {
                    throw new Error("خطأ في بيانات الـ API");
                }

            } catch (error) {
                console.error("Error:", error);
                if (document.getElementById('thinking-indicator')) {
                    document.getElementById('thinking-indicator').remove();
                }
                appendMessage('ai', "سوري يا الغالي، صارت مشكلة بالاتصال. تأكد أنك شابك انترنت والـ API Key شغال تمام.");
            }
        }

        // Listeners
        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });
    </script>
</body>
</html>
