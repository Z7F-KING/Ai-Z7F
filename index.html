<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multiverse | Pro Edition</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #8957e5; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; max-width: 85%; line-height: 1.6; }
        .user { align-self: flex-end; background: #238636; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; font-family: monospace; }
        .input-area { padding: 20px; background: var(--card); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; flex-direction: column; gap: 10px; }
        input { width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-think { background: var(--accent); color: white; }
        .btn-quick { background: #1f6feb; color: white; }
        .btn-send { background: #ffffff; color: black; }
        button:hover { opacity: 0.8; }
        @media (max-width: 600px) { .btns { flex-wrap: wrap; } button { width: 48%; } .btn-send { width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 1.2rem; font-weight: bold;">AI Multiverse 🚀</div>
        <div style="cursor: pointer; font-size: 1.5rem;">☰</div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="اطلب كود بايثون أو لوا...">
            <div class="btns">
                <button onclick="send('quick')" class="btn-quick">الرد السريع</button>
                <button onclick="send('thinking')" class="btn-think">زر التفكير</button>
                <button onclick="send('normal')" class="btn-send">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        async function send(mode) {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if(!input.value) return;

            const text = input.value;
            container.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text, mode: mode})
            });
            const data = await res.json();
            
            // تحويل الأكواد لشكل جميل
            let formattedReply = data.reply.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
            container.innerHTML += `<div class="msg ai"><b>🤖 ${mode}:</b><br>${formattedReply}</div>`;
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
