<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Chat</title>

<!-- ICONS -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#0a0a0f,#0f0f18);
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(20,20,30,0.7);
  backdrop-filter:blur(20px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;
  flex-direction:column;
}

.logo{
  font-size:20px;
  margin-bottom:20px;
  opacity:.8;
}

.select, .btn{
  margin-bottom:15px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a25;
  color:white;
  width:100%;
  cursor:pointer;
  transition:.2s;
}

.select:hover, .btn:hover{
  background:#2a2a3a;
}

/* CHAT */
.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  padding:14px;
  border-radius:14px;
  max-width:75%;
  animation:fade .3s ease;
}

.user{
  background:linear-gradient(135deg,#4a4aff,#6a6aff);
  align-self:flex-end;
}

.bot{
  background:#1c1c2b;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* INPUT */
.input-box{
  display:flex;
  padding:15px;
  gap:10px;
  border-top:1px solid rgba(255,255,255,0.05);
}

.input-box input{
  flex:1;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
}

.icon-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:12px;
  background:#1a1a25;
  color:white;
  cursor:pointer;
  font-size:20px;
  transition:.2s;
}

.icon-btn:hover{
  background:#2a2a3a;
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:800px){
  .sidebar{
    position:absolute;
    left:-260px;
    height:100%;
    z-index:10;
    transition:.3s;
  }

  .sidebar.active{
    left:0;
  }

  .menu-btn{
    position:absolute;
    top:15px;
    left:15px;
    z-index:20;
  }
}
</style>
</head>

<body>

<!-- MENU BUTTON -->
<button class="icon-btn menu-btn" onclick="toggleMenu()">
  <i class="ri-menu-line"></i>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">AI Ultra</div>

  <select id="model" class="select">
    <option value="openai/gpt-4o-mini">ChatGPT</option>
    <option value="google/gemini-pro">Gemini</option>
    <option value="anthropic/claude-3-haiku">Claude</option>
    <option value="meta-llama/llama-3-70b-instruct">LLaMA</option>
  </select>

  <button class="btn" onclick="toggleDeep()">
    <i class="ri-brain-line"></i> Deep Mode
  </button>

  <button class="btn" onclick="clearChat()">
    <i class="ri-delete-bin-line"></i> مسح
  </button>
</div>

<!-- CHAT -->
<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-box">
    <input id="input" placeholder="اكتب رسالة...">
    <button class="icon-btn" onclick="send()">
      <i class="ri-send-plane-fill"></i>
    </button>
  </div>
</div>

<script>
let deep=false;
let API_KEY="PUT_KEY";

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function toggleDeep(){
  deep=!deep;
  alert("Deep Mode: "+(deep?"ON":"OFF"));
}

function clearChat(){
  document.getElementById("messages").innerHTML="";
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
}

async function send(){
  const input=document.getElementById("input");
  const msg=input.value;
  const model=document.getElementById("model").value;

  if(!msg) return;

  addMsg(msg,"user");
  input.value="";

  addMsg("Typing...","bot");

  const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:model,
      messages:[
        {
          role:"system",
          content:deep
          ? "اعطِ تحليل عميق جداً"
          : "اجابة قصيرة"
        },
        {role:"user",content:msg}
      ]
    })
  });

  const data=await res.json();

  document.querySelector(".messages").lastChild.remove();

  addMsg(data.choices?.[0]?.message?.content || "Error","bot");
}
</script>

</body>
</html>
