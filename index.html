<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola AI - Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --accent: #38bdf8; --text: #f8fafc; --ai-msg: #1e293b; --user-msg: #0369a1; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 1px solid #334155; }
        #status { font-size: 0.75rem; color: var(--accent); margin-top: 5px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--user-msg); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-msg); border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 10px; }
        textarea { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 15px; outline: none; resize: none; font-size: 1rem; }
        button { background: var(--accent); border: none; padding: 0 20px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; }
    </style>
</head>
<body>

<header>
    <div>Dola AI (بدون API)</div>
    <div id="status">جاري تجهيز الذكاء الاصطناعي...</div>
</header>

<div id="chat-window">
    <div class="msg ai">أهلاً! انتظر قليلاً حتى يكتمل تحميل "الدماغ" الصغير بداخل المتصفح، ثم اسألني أي شيء.</div>
</div>

<div class="input-area">
    <textarea id="userInput" placeholder="اكتب هنا..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()" disabled>إرسال</button>
</div>

<script type="module">
    // استيراد المحرك الذي يعمل داخل المتصفح مباشرة
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const status = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const chatWin = document.getElementById("chat-window");
    let engine;

    // اختيار نموذج صغير جداً ليعمل على الجوال بسرعة
    const modelId = "SmolLM2-135M-Instruct-q4f16_1-MLC";

    async function init() {
        try {
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (p) => {
                    status.innerText = `جاري تحميل الدماغ: ${Math.round(p.progress * 100)}%`;
                    if(p.progress === 1) {
                        status.innerText = "جاهز للعمل بدون إنترنت!";
                        sendBtn.disabled = false;
                    }
                }
            });
        } catch (e) {
            status.innerText = "جهازك لا يدعم تشغيل الذكاء محلياً، حاول من متصفح Chrome.";
        }
    }

    window.send = async () => {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        input.value = "";
        
        const aiDiv = addMsg("يفكر...", 'ai');
        
        const chunks = await engine.chat.completions.create({
            messages: [{ role: "user", content: text }],
            stream: true
        });

        let reply = "";
        for await (const chunk of chunks) {
            reply += chunk.choices[0]?.delta?.content || "";
            aiDiv.innerText = reply;
            chatWin.scrollTop = chatWin.scrollHeight;
        }
    };

    function addMsg(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerText = text;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
        return div;
    }

    init();
</script>

</body>
</html>
