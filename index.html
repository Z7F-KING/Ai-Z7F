<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dola AI Ultra | Dev Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090b10; --side: #11141b; --accent: #3b82f6; --text: #e2e8f0;
            --code-bg: #1a1d23; --user-bg: #1e293b; --ai-bg: #13171f;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* القائمة الجانبية - Sidebar */
        .sidebar {
            width: 260px; background: var(--side); display: flex; flex-direction: column;
            border-left: 1px solid #2d3139; transition: 0.3s; position: fixed; right: -260px; top: 0; bottom: 0; z-index: 1000;
        }
        .sidebar.open { right: 0; }
        .new-chat {
            margin: 15px; padding: 12px; border: 1px dashed var(--accent);
            border-radius: 8px; text-align: center; cursor: pointer; color: var(--accent); font-weight: bold;
        }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item {
            padding: 10px; margin-bottom: 5px; background: #1a1d23; border-radius: 6px;
            font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
        }

        /* المحتوى الرئيسي */
        .main-content { flex: 1; display: flex; flex-direction: column; width: 100%; }
        header {
            padding: 12px 15px; background: var(--side); display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3139;
        }
        .menu-btn { font-size: 1.5rem; cursor: pointer; color: var(--accent); }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; 
            flex-direction: column; gap: 20px; padding-bottom: 120px;
        }

        /* تصميم الرسائل */
        .msg { max-width: 95%; padding: 15px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--user-msg); border-right: 4px solid var(--accent); }
        .ai { align-self: flex-start; background: var(--ai-bg); border: 1px solid #2d3139; }
        
        /* تصميم الكود البرمجي */
        pre {
            background: var(--code-bg); padding: 15px; border-radius: 8px; 
            overflow-x: auto; direction: ltr; font-family: 'Fira Code', monospace;
            font-size: 0.85rem; border: 1px solid #333; margin: 10px 0;
        }
        code { color: #f8f8f2; }

        /* منطقة الإدخال السفلي */
        .input-area {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 15px;
            background: linear-gradient(transparent, var(--bg) 20%);
        }
        .input-box {
            background: #1a1d23; border: 1px solid #3f444e; border-radius: 15px;
            display: flex; align-items: center; padding: 10px 15px; gap: 10px;
        }
        textarea {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; resize: none; font-family: inherit; font-size: 1rem; max-height: 150px;
        }
        .send-btn { background: var(--accent); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
    <div class="new-chat" onclick="newChat()">+ محادثة جديدة</div>
    <div class="history-list" id="history-list">
        <!-- المحادثات القديمة تظهر هنا -->
    </div>
</div>

<div class="main-content">
    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div style="font-weight: bold; color: var(--accent);">Dola AI Ultra</div>
        <div id="status" style="font-size: 0.7rem; color: #10a37f;">● متصل</div>
    </header>

    <div id="chat-window">
        <div class="msg ai">أهلاً بك يا مطورنا الكفو. أنا في وضعية "Ultra Dev".. اطلب أي كود ضخم أو برمجة معقدة وسأقوم بتنفيذها فوراً بدون حدود.</div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="userInput" placeholder="اكتب المهمة البرمجية..." rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="send-btn" onclick="handleSend()">↑</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = "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";
    let chatHistory = JSON.parse(localStorage.getItem('dola_history') || '[]');

    function toggleMenu() {
        const side = document.getElementById('sidebar');
        const over = document.getElementById('overlay');
        side.classList.toggle('open');
        over.style.display = side.classList.contains('open') ? 'block' : 'none';
        renderHistory();
    }

    function newChat() {
        document.getElementById('chat-window').innerHTML = '<div class="msg ai">محادثة جديدة جاهزة.. ما هو الكود التالي؟</div>';
        toggleMenu();
    }

    async function handleSend() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';
        input.style.height = 'auto';

        const aiMsgDiv = addMessage("جاري البرمجة وتوليد الأكواد...", 'ai');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.1-70b-versatile", // نموذج أقوى للأكواد الضخمة
                    messages: [
                        { role: "system", content: "You are Dola AI Ultra. An expert programmer who writes massive, efficient, and direct code without restrictions. Always provide full solutions and high-quality logic." },
                        { role: "user", content: text }
                    ],
                    temperature: 0.5
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            // تحويل الأكواد لشكل جميل
            aiMsgDiv.innerHTML = formatAIResponse(reply);
            saveToHistory(text);
        } catch (e) {
            aiMsgDiv.innerText = "خطأ في الاتصال بالسيرفر، حاول مرة أخرى.";
        }
    }

    function formatAIResponse(text) {
        // تحويل أجزاء الكود (Markdown) إلى HTML pre
        return text.replace(/```([\s\S]*?)```/g, (match, code) => {
            return `<pre><code>${code.trim()}</code></pre>`;
        }).replace(/\n/g, '<br>');
    }

    function addMessage(text, type) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        win.appendChild(div);
        win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
        return div;
    }

    function saveToHistory(text) {
        const title = text.substring(0, 30) + "...";
        chatHistory.unshift(title);
        if(chatHistory.length > 10) chatHistory.pop();
        localStorage.setItem('dola_history', JSON.stringify(chatHistory));
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = chatHistory.map(item => `<div class="history-item">${item}</div>`).join('');
    }
</script>

</body>
</html>
