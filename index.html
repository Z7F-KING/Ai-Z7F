<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ULTRA V3 PRO</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
:root{
  --bg:#0a0b10;
  --panel:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.08);
  --accent:#7c5cff;
  --text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:radial-gradient(circle at top,#15162a,#0a0b10);
  height:100vh;
  overflow:hidden;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:var(--panel);
  backdrop-filter:blur(20px);
  border-right:1px solid var(--stroke);
  padding:18px;
  position:fixed;
  top:0;bottom:0;left:0;
  transition:.3s;
}

.sidebar.hide{
  transform:translateX(-100%);
}

.title{
  font-weight:bold;
  margin-bottom:15px;
  opacity:.9;
}

select, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:#151625;
  color:white;
  cursor:pointer;
  transition:.2s;
}

button:hover, select:hover{
  transform:scale(1.02);
  background:#23243a;
}

/* CHAT */
.chat{
  margin-left:280px;
  flex:1;
  display:flex;
  flex-direction:column;
  transition:.3s;
}

.chat.full{
  margin-left:0;
}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:14px;
  border-bottom:1px solid var(--stroke);
  background:rgba(0,0,0,0.2);
}

.icon{
  width:42px;
  height:42px;
  border-radius:10px;
  border:none;
  background:#151625;
  color:white;
  cursor:pointer;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.msg{
  max-width:75%;
  padding:14px;
  border-radius:14px;
  animation:pop .25s ease;
  white-space:pre-wrap;
}

@keyframes pop{
  from{transform:translateY(10px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#6d5cff,#8b7bff);
}

.bot{
  align-self:flex-start;
  background:#151625;
  border:1px solid var(--stroke);
}

/* INPUT */
.inputbar{
  display:flex;
  gap:10px;
  padding:14px;
  border-top:1px solid var(--stroke);
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#12131f;
  color:white;
}

.send{
  width:50px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:850px){
  .sidebar{transform:translateX(-100%);}
  .chat{margin-left:0;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="title">⚡ AI ULTRA V3 PRO</div>

  <select id="model">
    <option value="openai/gpt-4o-mini">ChatGPT</option>
    <option value="google/gemini-pro">Gemini</option>
    <option value="anthropic/claude-3-haiku">Claude</option>
    <option value="meta-llama/llama-3-70b">LLaMA 3</option>
    <option value="mistralai/mixtral-8x7b">Mixtral</option>
  </select>

  <button onclick="toggleDeep()">🧠 Deep Mode</button>
  <button onclick="clearChat()">🗑️ Clear</button>
</div>

<!-- CHAT -->
<div class="chat" id="chat">

  <div class="topbar">
    <button class="icon" onclick="toggleSidebar()">
      <i class="ri-menu-line"></i>
    </button>
    <div>AI Ultra V3 PRO</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputbar">
    <input id="input" placeholder="اكتب رسالتك...">
    <button class="send" onclick="send()">
      <i class="ri-send-plane-fill"></i>
    </button>
  </div>

</div>

<script>
let deep=false;

/* ⚠️ IMPORTANT: ضع مفتاحك من OpenRouter هنا فقط */
const API_KEY="PUT_YOUR_OPENROUTER_KEY_HERE";

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hide");
  document.getElementById("chat").classList.toggle("full");
}

function toggleDeep(){
  deep=!deep;
  alert("Deep Mode: "+(deep?"ON":"OFF"));
}

function clearChat(){
  document.getElementById("messages").innerHTML="";
  localStorage.removeItem("chat");
}

function addMsg(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("messages").appendChild(div);
  div.scrollIntoView({behavior:"smooth"});

  saveChat();
}

/* حفظ المحادثة */
function saveChat(){
  localStorage.setItem("chat",
    document.getElementById("messages").innerHTML
  );
}

/* تحميل المحادثة */
window.onload=()=>{
  const saved=localStorage.getItem("chat");
  if(saved){
    document.getElementById("messages").innerHTML=saved;
  }
}

/* typing effect */
function typingEffect(el,text){
  let i=0;
  el.innerText="";
  let interval=setInterval(()=>{
    if(i<text.length){
      el.innerText+=text[i];
      i++;
    }else clearInterval(interval);
  },10);
}

async function send(){
  const input=document.getElementById("input");
  const msg=input.value;
  const model=document.getElementById("model").value;

  if(!msg) return;

  addMsg(msg,"user");
  input.value="";

  const bot=document.createElement("div");
  bot.className="msg bot";
  bot.innerText="...";
  document.getElementById("messages").appendChild(bot);

  const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
    method:"POST",
    headers:{
      "Authorization":"Bearer "+API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      model:model,
      messages:[
        {
          role:"system",
          content: deep
          ? "أجب بتحليل عميق ومنظم جداً مع شرح"
          : "أجب بشكل مختصر وواضح"
        },
        {role:"user",content:msg}
      ]
    })
  });

  const data=await res.json();

  const text=data.choices?.[0]?.message?.content || "Error";

  typingEffect(bot,text);
}
</script>

</body>
</html>
