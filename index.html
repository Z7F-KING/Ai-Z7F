<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dola Elite AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5cf6;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* خلفية متحركة خفيفة */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1033 0%, #050505 100%);
            z-index: -1;
        }

        /* تأثير الزجاج */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        /* منطقة الرسائل */
        #chatBox {
            height: calc(100vh - 180px);
            scrollbar-width: none;
        }
        #chatBox::-webkit-scrollbar { display: none; }

        .msg-bubble {
            max-width: 85%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* زر العقل (التفكير العميق) */
        .brain-btn {
            font-size: 1.4rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #666;
        }
        .brain-active {
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            transform: scale(1.2) rotate(10deg);
        }

        /* زر الإرسال */
        .send-btn {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* القائمة السفلية للجوال والصفحات */
        .nav-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 25px;
            width: fit-content;
            padding: 10px 25px;
            display: flex;
            gap: 30px;
            z-index: 100;
        }

        .nav-item {
            font-size: 1.2rem;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); }

        /* لودينج */
        .typing-dot {
            width: 6px; height: 6px; background: #888; border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <!-- الهيدر (أيقونات فقط) -->
    <header class="p-5 flex justify-between items-center max-w-5xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-indigo-500"><i class="fas fa-bolt"></i> DOLA</div>
        <div class="flex gap-4">
            <select id="modelSelect" class="bg-transparent text-xs border-none text-gray-400 outline-none cursor-pointer">
                <option value="llama-3.3-70b-versatile">DeepSec (High)</option>
                <option value="mixtral-8x7b-32768">Balanced</option>
                <option value="gemma2-9b-it">Fast</option>
            </select>
            <i class="fas fa-history text-gray-500 cursor-pointer hover:text-white"></i>
            <i class="fas fa-cog text-gray-500 cursor-pointer hover:text-white"></i>
        </div>
    </header>

    <!-- منطقة المحتوى (صفحة الشات) -->
    <section id="chatPage" class="max-w-4xl mx-auto px-4">
        <div id="chatBox" class="overflow-y-auto pt-4">
            <!-- رسالة ترحيب -->
            <div class="msg-bubble glass-card mx-auto text-center border-none" style="background: transparent;">
                <i class="fas fa-sparkles text-indigo-400 mb-2 text-2xl"></i>
                <p class="text-gray-400 text-sm">أنا Dola.. اطلب ما تشاء وسأحوله لواقع</p>
            </div>
        </div>

        <!-- بار الإدخال العظيم -->
        <div class="fixed bottom-24 left-0 right-0 px-4">
            <div class="max-w-3xl mx-auto glass-card p-2 flex items-center gap-3 border-gray-800 shadow-2xl">
                <button title="إرفاق ملف" class="p-3 text-gray-500 hover:text-white transition"><i class="fas fa-plus"></i></button>
                
                <textarea id="userInput" rows="1" class="flex-grow bg-transparent p-2 outline-none resize-none text-sm" placeholder="أدخل عبقريتك هنا..."></textarea>
                
                <div class="flex items-center gap-4 px-2">
                    <!-- أيقونة العقل (تفكير عميق) -->
                    <button id="thinkBtn" onclick="toggleThinking()" title="تفكير عميق" class="brain-btn">
                        <i class="fas fa-brain"></i>
                    </button>
                    
                    <!-- زر الإرسال -->
                    <button onclick="sendMessage()" class="send-btn w-10 h-10 rounded-full flex items-center justify-center transition active:scale-90">
                        <i class="fas fa-arrow-up text-white"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- شريط الصفحات السفلي -->
    <nav class="nav-bar glass-card">
        <div onclick="switchPage('chat')" class="nav-item active"><i class="fas fa-comment-dots"></i></div>
        <div onclick="switchPage('discover')" class="nav-item"><i class="fas fa-compass"></i></div>
        <div onclick="switchPage('library')" class="nav-item"><i class="fas fa-layer-group"></i></div>
        <div onclick="switchPage('user')" class="nav-item"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <script>
        const API_KEY = "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";
        let isThinking = false;

        function toggleThinking() {
            isThinking = !isThinking;
            document.getElementById('thinkBtn').classList.toggle('brain-active');
            // تأثير اهتزاز خفيف عند التفعيل
            navigator.vibrate?.(50);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            const loadingId = 'ai-' + Date.now();
            appendMessage('ai', `<div class="flex gap-1 py-2"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div></div>`, loadingId);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: document.getElementById('modelSelect').value,
                        messages: [
                            { role: "system", content: isThinking ? "أنت ذكاء اصطناعي فائق، فكر بعمق شديد، قدم تحليلات فلسفية وتقنية دقيقة جداً." : "أنت مساعد ذكي وسريع." },
                            { role: "user", content: message }
                        ],
                        temperature: isThinking ? 0.2 : 0.7 // تقليل العشوائية عند التفكير العميق
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                document.getElementById(loadingId).innerHTML = `<div class="prose prose-invert text-sm leading-relaxed">${content.replace(/\n/g, '<br>')}</div>`;
            } catch (error) {
                document.getElementById(loadingId).innerText = "حدث خطأ في الاتصال.. تأكد من الـ API";
            }
        }

        function appendMessage(role, text, id = '') {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg-bubble ${role === 'user' ? 'bg-[#1a1a1a] ml-auto' : 'glass-card mr-auto border-none'}`;
            if(id) div.id = id;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function switchPage(page) {
            // تأثير بصري بسيط للتبديل
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log("Switched to page: " + page);
        }

        // تحسين الكتابة
        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
