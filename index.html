<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLA-X PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family:sans-serif; background:#0d1117; color:#fff; margin:0; overflow:hidden; }
</style>
</head>

<body class="h-screen flex flex-col">

<!-- Sidebar -->
<div id="sidebar" class="fixed top-0 right-0 h-full w-72 bg-[#0d1117] border-l border-[#30363d] translate-x-full transition z-50">
    <div class="p-4">
        <button onclick="createNewChat()" class="w-full bg-cyan-600 p-2 rounded">محادثة جديدة</button>
        <div id="chatList" class="mt-4 space-y-2"></div>
    </div>
</div>

<!-- Header -->
<header class="h-14 flex justify-between items-center px-4 border-b border-[#30363d]">
    <button onclick="toggleSidebar()">☰</button>
    <h1>DOLA-X PRO</h1>
</header>

<!-- Chat -->
<main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4">
    <div id="welcomeScreen" class="text-center opacity-30 mt-20">
        جاهز...
    </div>
</main>

<!-- Input -->
<div class="p-3 border-t border-[#30363d]">
    <textarea id="userInput" class="w-full bg-black p-2 rounded resize-none"></textarea>
    <button onclick="handleSend()" class="mt-2 w-full bg-cyan-600 p-2 rounded">إرسال</button>
</div>

<script>

// ⚠️ حط مفتاحك الصحيح هنا (بدون رموز غريبة)
const API_KEY = "PASTE_YOUR_REAL_KEY_HERE";

let currentChatId = Date.now() + Math.random();
let allChats = JSON.parse(localStorage.getItem('dola_v3_chats')) || {};

lucide.createIcons();

// Sidebar
function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('translate-x-full');
    renderChatList();
}

// محادثة جديدة
function createNewChat(){
    currentChatId = Date.now() + Math.random();

    document.getElementById('chatBox').innerHTML = `
        <div id="welcomeScreen" class="text-center opacity-30 mt-20">
            جاهز...
        </div>
    `;
}

// عرض المحادثات
function renderChatList(){
    const list = document.getElementById('chatList');
    list.innerHTML = '';

    Object.keys(allChats).reverse().forEach(id=>{
        const div = document.createElement('div');
        div.className = "p-2 bg-[#161b22] rounded cursor-pointer text-sm";
        div.innerText = allChats[id][0]?.content?.slice(0,20) || "محادثة";

        div.onclick = ()=>{
            currentChatId = id;
            loadChat(id);
            toggleSidebar();
        };

        list.appendChild(div);
    });
}

// تحميل
function loadChat(id){
    const chatBox = document.getElementById('chatBox');
    chatBox.innerHTML = '';

    allChats[id].forEach(msg=>{
        displayMsg(msg.role, msg.content);
    });
}

// إرسال
async function handleSend(){
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if(!text) return;

    document.getElementById('welcomeScreen')?.remove();

    displayMsg('user', text);
    input.value = '';

    if(!allChats[currentChatId]) allChats[currentChatId] = [];
    allChats[currentChatId].push({role:'user', content:text});

    try{
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Authorization":"Bearer "+API_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                model:"llama3-70b-8192",
                messages: allChats[currentChatId],
                temperature:0.3
            })
        });

        if(!res.ok){
            throw new Error("API Error");
        }

        const data = await res.json();
        const reply = data.choices[0].message.content;

        displayMsg('assistant', reply);
        allChats[currentChatId].push({role:'assistant', content:reply});

        // 💾 حماية التخزين
        try{
            const keys = Object.keys(allChats);
            if(keys.length > 20){
                delete allChats[keys[0]];
            }
            localStorage.setItem('dola_v3_chats', JSON.stringify(allChats));
        }catch(e){
            localStorage.clear();
        }

    }catch(err){
        displayMsg('assistant', "خطأ: "+err.message);
    }
}

// عرض (XSS مثل ما طلبت بدون تعديل)
function displayMsg(role, content){
    const chatBox = document.getElementById('chatBox');

    const div = document.createElement('div');
    div.className = role === 'user' ? "text-left" : "text-right";

    div.innerHTML = `
        <div class="p-3 rounded bg-${role === 'user' ? 'cyan-700' : '[#161b22]'}">
            <b>${role}</b><br>${content}
        </div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter للإرسال
document.getElementById('userInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        handleSend();
    }
});

</script>

</body>
</html>
